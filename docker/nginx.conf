worker_processes 4;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # location / {
        #     proxy_pass http://netlab_frontend:3000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        location / {
            #The location setting lets you configure how nginx responds to requests for resources within the server.
            root   html;
            index  index.html index.htm;
        }

        location /api/ {
            proxy_pass http://netlab_server:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GNS3 Lab
        location /gns3-server/ {
            proxy_pass http://netlab_lab:3080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rewrite redirects and URLs
            proxy_redirect http://$host:3080/ /gns3-server/;
            proxy_redirect /static/web-ui/ /gns3-server/static/web-ui/;
            
            sub_filter_once off;
            sub_filter_types *;
            sub_filter 'http://localhost:3080' '/gns3-server';
            sub_filter 'href="/static' 'href="/gns3-server/static';
            sub_filter 'src="/static' 'src="/gns3-server/static';
            sub_filter 'action="/static' 'action="/gns3-server/static';
        }

        location /v3/ {
            proxy_pass http://netlab_lab:3080/v3/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}